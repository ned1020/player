<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Video Player</title>
    <style>
        body {
            background-color: #1a1e24;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .download-btn {
            background-color: #4a90e2;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .download-btn:hover {
            background-color: #357abd;
        }
    </style>
</head>
<body>
    <h1>My Video Player App</h1>
    <p>Get the full app to automatically scan and play your videos.</p>
    
    <a href="/app.apk" download="VideoPlayer.apk" class="download-btn">
        Download for Android
    </a>
</body>
</html>
