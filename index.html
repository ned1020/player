<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Video Player UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #1a1e24;
            --surface-color: #2a2e35;
            --text-primary: #ffffff;
            --text-secondary: #8b929b;
            --accent-blue: #4a90e2;
            --badge-bg: #2d3b4e;
            --badge-text: #8ab4f8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header-icons {
            display: flex;
            gap: 20px;
            color: var(--text-primary);
            font-size: 20px;
        }

        .top-nav {
            display: flex;
            gap: 12px;
            padding: 0 20px 20px 20px;
            overflow-x: auto; 
            scrollbar-width: none; 
        }
        
        .top-nav::-webkit-scrollbar {
            display: none; 
        }

        .pill {
            background-color: var(--surface-color);
            color: var(--text-primary);
            border: none;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            white-space: nowrap;
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 80px 20px; 
        }
