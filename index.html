<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Video Player UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #1a1e24;
            --surface-color: #2a2e35;
            --text-primary: #ffffff;
            --text-secondary: #8b929b;
            --accent-blue: #4a90e2;
            --badge-bg: #2d3b4e;
            --badge-text: #8ab4f8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header-icons {
            display: flex;
            gap: 20px;
            color: var(--text-primary);
            font-size: 20px;
        }

        .top-nav {
            display: flex;
            gap: 12px;
            padding: 0 20px 20px 20px;
            overflow-x: auto; 
            scrollbar-width: none; 
        }
        
        .top-nav::-webkit-scrollbar {
            display: none; 
        }

        .pill {
            background-color: var(--surface-color);
            color: var(--text-primary);
            border: none;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            white-space: nowrap;
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 80px 20px; 
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05); /* Added slight divider */
        }

        .file-icon {
            min-width: 50px;
            height: 50px;
            background-color: var(--surface-color);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: var(--accent-blue);
            margin-right: 16px;
        }

        .file-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow: hidden; /* Prevents long names from breaking layout */
        }

        .file-name {
            font-size: 15px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Adds '...' if the file name is too long */
        }

        .file-stats {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .size-badge {
            background-color: var(--badge-bg);
            color: var(--badge-text);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header>
        <h1>Videos</h1>
        <div class="header-icons">
            <i class="fas fa-file-video" id="scanBtn" style="cursor: pointer; color: var(--accent-blue);" title="Select Videos"></i>
            <i class="fas fa-search"></i>
            <i class="fas fa-ellipsis-v"></i>
        </div>
    </header>

    <input type="file" id="fileInput" multiple accept="video/*" style="display: none;">

    <div class="top-nav">
        <button class="pill"><i class="fas fa-music"></i> Music</button>
        <button class="pill"><i class="fas fa-lock"></i> Privacy</button>
        <button class="pill"><i class="fas fa-share-alt"></i> MXShare</button>
        <button class="pill"><i class="fas fa-list"></i> Video Playlist</button>
    </div>

    <main id="fileList">
        <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
            <i class="fas fa-video" style="font-size: 40px; margin-bottom: 10px;"></i>
            <p>Tap the blue icon in the top right to select videos.</p>
        </div>
    </main>

    <script>
        const scanBtn = document.getElementById('scanBtn');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');

        // Open the native file picker
        scanBtn.addEventListener('click', () => {
            fileInput.click();
        });

        // Format file size nicely
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        // Process files when the user finishes selecting them
        fileInput.addEventListener('change', (event) => {
            const files = event.target.files;
            
            // Clear the placeholder screen
            fileList.innerHTML = ''; 

            let hasVideos = false;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];

                // Only show it if it's a video file
                if (file.type.startsWith('video/')) {
                    hasVideos = true;
                    const sizeFormatted = formatBytes(file.size);

                    // Create a list item for each individual file
                    const fileHTML = `
                        <div class="file-item">
                            <div class="file-icon"><i class="fas fa-play"></i></div>
                            <div class="file-info">
                                <div class="file-name">${file.name}</div>
                                <div class="file-stats"><span class="size-badge">${sizeFormatted}</span></div>
                            </div>
                        </div>
                    `;
                    fileList.insertAdjacentHTML('beforeend', fileHTML);
                }
            }

            // If they selected files but none of them were videos
            if (!hasVideos) {
                fileList.innerHTML = '<p style="text-align:center; padding: 20px; color: var(--text-secondary);">No videos found in your selection.</p>';
            }
        });
    </script>
</body>
</html>
